name: Run Test Suite

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest  # Automated test runner

      - name: Run Pytest Suite
        env:
            DIGITRANSIT_API_KEY: "mock_key_for_ci_testing_only"
        run: |
          # Executes any test files sitting in a tests/ folder
          pytest